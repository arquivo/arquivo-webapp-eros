services:
    node:
      build:
        context: .
        dockerfile: Dockerfile
        target: production
      environment:
        - NODE_ENV=production
      ports:
        - "3000:3000"
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:3000/"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 40s
      restart: unless-stopped
      # Optional: Resource limits for production
      # deploy:
      #   resources:
      #     limits:
      #       cpus: '1'
      #       memory: 512M
      #     reservations:
      #       cpus: '0.5'
      #       memory: 256M
