services:
    node:
      build:
        context: .
        dockerfile: Dockerfile
        target: production
      environment:
        - NODE_ENV=production
      dns:
        - 8.8.8.8
        - 8.8.4.4
      ports:
        - "3000:3000"
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:3000/"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 40s
      restart: unless-stopped
      # hosts file entries
      # extra_hosts:
      #   - "arquivo.pt:194.210.235.20"
      # Security hardening options
      security_opt:
        # Prevents container processes from gaining additional privileges
        - no-new-privileges:true
      # Makes container filesystem read-only (prevents tampering with files)
      read_only: true
      # Drop all Linux capabilities (defense in depth)
      cap_drop:
        - ALL
      # Only add back the specific capability needed to bind to port 3000
      cap_add:
        - NET_BIND_SERVICE
      # Optional: Resource limits for production
      # deploy:
      #   resources:
      #     limits:
      #       cpus: '1'
      #       memory: 512M
      #     reservations:
      #       cpus: '0.5'
      #       memory: 256M
      #
      
      # Run the container as a non-root user for better security
      # forcing using user wayback:tomba
      user: 653:504
      volumes:
        - ./logs:/home/node/app/logs
        - ./uploads:/home/node/app/uploads
