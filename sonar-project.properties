# SonarQube Project Configuration

# Project identification
sonar.projectKey=arquivo_responsive-design
sonar.organization=arquivo

# Source code settings
sonar.sources=src

# Test file patterns (auto-detected, excluded from main analysis)
sonar.test.inclusions=**/__tests__/**,**/*.test.js,**/*.spec.js
sonar.coverage.exclusions=**/__tests__/**,**/*.test.js,**/*.spec.js

# Exclude additional files from analysis
sonar.exclusions=\
  **/node_modules/**,\
  **/coverage/**,\
  **/public/vendor/**,\
  **/*.test.js,\
  **/*.spec.js,\
  **/__tests__/**

# Exclude test files from security hotspot analysis
sonar.security.hotspots.exclusions=\
  **/__tests__/**,\
  **/*.test.js,\
  **/*.spec.js

# JavaScript/TypeScript settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
