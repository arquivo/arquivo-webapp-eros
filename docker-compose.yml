services:
    node:
      build:
        context: .
        dockerfile: Dockerfile
        target: development
      environment:
        - NODE_ENV=development
      volumes:
        - ./:/home/node/app
        - /home/node/app/node_modules
      ports:
        - "3000:3000"
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:3000/"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 40s
      restart: unless-stopped
